<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>COMPILAS?</title>
  <link rel="icon" type="image/png" href="Icont.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ecrã do logo -->
  <div id="logo-screen">
    <img id="logo-img" src="logotetris.png" alt="Tetris Logo" />
    <button id="btn-continue" class="action-btn cyan">▶ CONTINUAR</button>
  </div>

  <!-- Ecrã inicial -->
  <div id="start-screen" class="hidden">
    <div id="start-title">COMPILAS?</div>
    <button id="btn-play" class="action-btn cyan">▶ JOGAR</button>
  </div>

  <div id="wrapper">

    <div id="game-area">

      <!-- HUD lateral esquerdo -->
      <div id="side-hud">
        <div class="hud-box">
          <div class="hud-label">SCORE</div>
          <div id="score" class="hud-value cyan">0</div>
        </div>
        <div class="hud-box">
          <div class="hud-label">NÍVEL</div>
          <div id="level" class="hud-value cyan">1</div>
        </div>
        <div class="hud-box">
          <div class="hud-label">COMBO</div>
          <div id="combo" class="hud-value yellow">x0</div>
        </div>
        <div class="hud-box">
          <div class="hud-label">PRÓXIMO</div>
          <canvas id="preview" width="56" height="56"></canvas>
        </div>
      </div>

      <!-- Tabuleiro -->
      <div id="board-container">
        <canvas id="board"></canvas>
        <div id="overlay" class="hidden">
          <div id="overlay-msg"></div>
        </div>
      </div>

      <!-- HUD lateral direito: pausa + recompilar -->
      <div id="side-hud-right">
        <button class="tc-btn purple side-ctrl" id="tc-pause">⏸<br><span>PAUSA</span></button>
        <button class="tc-btn cyan side-ctrl" id="btn-restart">⟳<br><span>RESET</span></button>
      </div>

    </div>

    <div id="touch-controls">
      <div class="touch-row">
        <button class="tc-btn purple wide" id="tc-rotate">↑<br><span>RODAR</span></button>
      </div>
      <div class="touch-row">
        <button class="tc-btn cyan wide-half" id="tc-left">◀<br><span>ESQ</span></button>
        <button class="tc-btn cyan wide-half" id="tc-right">▶<br><span>DIR</span></button>
      </div>
      <div class="touch-row">
        <button class="tc-btn yellow wide" id="tc-drop">⬇<br><span>DROP</span></button>
      </div>
    </div>

  </div>
  <audio id="bg-music" src="tetris.mp3" loop></audio>
  <audio id="intro-music" src="intretis.mp3" loop></audio>
  <audio id="gameover-music" src="gameover.mp3"></audio>
  <script src="game.js"></script>
</body>
</html>
