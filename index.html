<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COMPILAS? — O Jogo do T</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="wrapper">
    <h1>COMPILAS?</h1>
    <h2>O JOGO DO T</h2>

    <div id="game-area">
      <!-- HUD esquerda -->
      <div class="hud hud-left">
        <div class="hud-label">SCORE</div>
        <div id="score">0</div>
        <div class="hud-label" style="margin-top:2rem;">NÍVEL</div>
        <div id="level">1</div>
        <div class="hud-label" style="margin-top:2rem;">LINHAS</div>
        <div id="lines">0</div>
      </div>

      <!-- Tabuleiro -->
      <div id="board-container">
        <canvas id="board" width="300" height="600"></canvas>
        <div id="overlay" class="hidden">
          <div id="overlay-msg"></div>
        </div>
      </div>

      <!-- HUD direita -->
      <div class="hud hud-right">
        <div class="hud-label">PRÓXIMO</div>
        <canvas id="preview" width="120" height="120"></canvas>
        <div class="hud-label" style="margin-top:2rem;">COMBO</div>
        <div id="combo">x0</div>
        <div class="hud-label" style="margin-top:2rem;">CONTROLOS</div>
        <div class="controls-info">
          <span>← → mover</span>
          <span>↑ rodar</span>
          <span>↓ descer</span>
          <span>SPACE drop</span>
          <span>P pausa</span>
        </div>
      </div>
    </div>

    <div id="buttons">
      <button id="btn-restart">⟳ RECOMPILAR</button>
      <button id="btn-pause">⏸ PAUSA</button>
    </div>

    <!-- Controlos touch -->
    <div id="touch-controls">
      <div class="touch-row">
        <button id="tc-rotate">↑ RODAR</button>
      </div>
      <div class="touch-row">
        <button id="tc-left">◀</button>
        <button id="tc-down">▼</button>
        <button id="tc-right">▶</button>
      </div>
      <div class="touch-row">
        <button id="tc-drop">⬇ DROP</button>
      </div>
    </div>

  </div>

  <script src="game.js"></script>
</body>
</html>
